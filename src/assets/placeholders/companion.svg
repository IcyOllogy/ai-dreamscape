<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF1B6B" stop-opacity="0.35" />
      <stop offset="0.5" stop-color="#0A0A0A" stop-opacity="1" />
      <stop offset="1" stop-color="#A855F7" stop-opacity="0.35" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#FF1B6B" stop-opacity="0.25" />
      <stop offset="0.55" stop-color="#A855F7" stop-opacity="0.12" />
      <stop offset="1" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="800" height="1200" fill="#020202" />
  <rect width="800" height="1200" fill="url(#bg)" />
  <circle cx="400" cy="360" r="360" fill="url(#glow)" filter="url(#soft)" />

  <!-- Abstract silhouette -->
  <g opacity="0.85">
    <circle cx="400" cy="380" r="150" fill="rgba(255,255,255,0.08)" />
    <path
      d="M220 1100c30-220 160-360 180-370 20 10 150 150 180 370"
      fill="rgba(255,255,255,0.07)"
    />
  </g>

  <!-- Subtle grid -->
  <g opacity="0.08">
    <path d="M0 240h800M0 480h800M0 720h800M0 960h800" stroke="#FFFFFF" />
    <path d="M200 0v1200M400 0v1200M600 0v1200" stroke="#FFFFFF" />
  </g>

  <!-- Caption -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" text-anchor="middle">
    <text x="400" y="1060" font-size="18" fill="rgba(255,255,255,0.55)" letter-spacing="6">
      PLACEHOLDER
    </text>
    <text x="400" y="1095" font-size="12" fill="rgba(255,255,255,0.40)" letter-spacing="2">
      Replace with realistic portrait (2:3)
    </text>
  </g>
</svg>
